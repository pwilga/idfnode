    path: components/cikon_supervisor_adapters/cikon_supervisor_adapters_ds18b20
    matches:
      - if: "$CONFIG{ENABLE_SUPERVISOR_DS18B20} == True"

  cikon_supervisor_adapters_esp_now_rx:
    git: "https://github.com/pwilga/cikon-iot-solution.git"
    path: components/cikon_supervisor_adapters/cikon_supervisor_adapters_esp_now_rx
    matches:
      - if: "$CONFIG{ENABLE_SUPERVISOR_ESP_NOW_RX} == True"
