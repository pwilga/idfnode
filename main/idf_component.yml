      - if: "$CONFIG{ENABLE_SUPERVISOR_LED} == True"

  cikon_supervisor_adapters_neopixel:
    git: "https://github.com/pwilga/cikon-iot-solution.git"
    path: components/cikon_supervisor_adapters/cikon_supervisor_adapters_neopixel
    matches:
